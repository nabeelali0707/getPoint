services:
  postgres:
    image: postgres:16-alpine
    container_name: point-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: point
      POSTGRES_PASSWORD: point
      POSTGRES_DB: point_management
    ports:
      - "5432:5432"
    volumes:
      - point_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: point-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - point_redis_data:/data

volumes:
  point_postgres_data:
  point_redis_data:
